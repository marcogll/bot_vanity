services:
  vanessa-app:
    build: .
    image: marcogll/vanessa-bot-vanity:latest
    container_name: vanessa-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${VANITY_DB_USER:-vanity_user}:${VANITY_DB_PASSWORD:-vanity_password}@vanessa-db:5432/${VANITY_DB_NAME:-vanity_db}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-change-me}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-vanity-instance}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      AES_ENCRYPTION_KEY: ${AES_ENCRYPTION_KEY:?AES_ENCRYPTION_KEY is required}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      MEMORY_RETENTION_DAYS: ${MEMORY_RETENTION_DAYS:-30}
      BOOKING_URL: ${BOOKING_URL:-https://vanitynails.fresh.com}
      PORT: 8000
    ports:
      - "8001:8000"
    networks:
      - vanity-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  vanessa-db:
    image: postgres:15
    container_name: vanity-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${VANITY_DB_USER:-vanity_user}
      POSTGRES_PASSWORD: ${VANITY_DB_PASSWORD:-vanity_password}
      POSTGRES_DB: ${VANITY_DB_NAME:-vanity_db}
    volumes:
      - vanity_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - vanity-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vanity_user -d vanity_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    restart: unless-stopped
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${SERVICE_URL_EVOLUTION_API:-${EVOLUTION_SERVER_URL:-http://localhost:8080}}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me}
      DEL_INSTANCE: "false"
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: ERROR,WARN,INFO,WEBHOOKS
      LOG_COLOR: "true"
      LOG_BAILEYS: error
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://vanessa-app:8000/webhook?apiKey=${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_GLOBAL_WEBHOOK_BASE64: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${EVOLUTION_DB_USER:-evolution_user}:${EVOLUTION_DB_PASSWORD:-evolution_password}@evolution-db:5432/${EVOLUTION_DB_NAME:-evolution_db}?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_v2
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      RABBITMQ_ENABLED: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
    expose:
      - "8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - vanity-net

  evolution-db:
    image: postgres:15
    container_name: evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER:-evolution_user}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-evolution_password}
      POSTGRES_DB: ${EVOLUTION_DB_NAME:-evolution_db}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - vanity-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${EVOLUTION_DB_USER:-evolution_user} -d ${EVOLUTION_DB_NAME:-evolution_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - evolution_redis_data:/data
    networks:
      - vanity-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  vanity-net:
    driver: bridge

volumes:
  vanity_postgres_data:
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances:
